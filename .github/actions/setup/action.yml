name: Setup
description: Install Node from .nvmrc, verify lockfile sync, install deps

runs:
  using: composite
  steps:
    - name: Setup Node from .nvmrc
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Verify lockfile is in sync with package.json
      shell: bash
      # --ignore-scripts because npm 10's dry-run still runs lifecycle
      # scripts (e.g. 'prepare: husky'), and dry-run shouldn't have
      # side effects. The real install below runs scripts as normal.
      run: npm ci --dry-run --ignore-scripts

    - name: Install dependencies
      shell: bash
      run: npm ci --prefer-offline
