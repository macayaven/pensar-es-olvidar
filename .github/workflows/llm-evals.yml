name: LLM Evals

on:
  pull_request:
    branches: [main]
    paths:
      - 'evals/**'
      - 'src/prompts.ts'
      - 'src/i18n/locales/**'
      - '.github/workflows/llm-evals.yml'
  schedule:
    # Mondays at 06:00 UTC — catch model drift even when prompts are stable.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  # PR pushes: cancel-in-progress saves API budget on rapid resubmits.
  # workflow_dispatch (manual stability sampling): each run gets a unique
  # group so multiple triggers on the same ref accumulate in parallel
  # rather than serializing or cancelling each other.
  # schedule (weekly cron): shared group; cron interval makes it moot.
  group: llm-evals-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  miras:
    name: promptfoo baseline · chained retention
    runs-on: ubuntu-latest
    # Scope GOOGLE_API_KEY to the 'evals' environment — repository-level
    # secrets are accessible from every workflow; environment secrets
    # require explicit opt-in via `environment:` on the job. Right blast
    # radius for a paid API key.
    environment: evals
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run promptfoo single-shot baseline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run eval:miras

      - name: Run chained MIRAS retention eval
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run eval:chain

      - name: Upload eval artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-artefacts
          path: |
            .promptfoo/
            promptfoo-output.json
            evals/output/
          retention-days: 30
          if-no-files-found: ignore
