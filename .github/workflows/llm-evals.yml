name: LLM Evals

on:
  pull_request:
    branches: [main]
    paths:
      - 'evals/**'
      - 'src/prompts.ts'
      - 'src/i18n/locales/**'
      - '.github/workflows/llm-evals.yml'
  schedule:
    # Mondays at 06:00 UTC — catch model drift even when prompts are stable.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: llm-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  miras:
    name: promptfoo baseline · chained retention
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run promptfoo single-shot baseline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run eval:miras

      - name: Run chained MIRAS retention eval
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run eval:chain

      - name: Upload eval artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-artefacts
          path: |
            .promptfoo/
            promptfoo-output.json
            evals/output/
          retention-days: 30
          if-no-files-found: ignore
